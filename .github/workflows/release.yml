name: Release Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version/tag, for example v0.2.0'
        required: true
        type: string

permissions:
  contents: write

env:
  EXTENSION_NAME: ${{ github.event.repository.name }}
  VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
    steps:
      - name: Checkout extension
        uses: actions/checkout@v5
        with:
          path: ${{ env.EXTENSION_NAME }}

      - name: Checkout Cannon package
        uses: actions/checkout@v5
        with:
          repository: rob121/cannon
          path: cannon
          token: ${{ secrets.CANNON_REPO_TOKEN || github.token }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.EXTENSION_NAME }}/go.mod
          cache-dependency-path: ${{ env.EXTENSION_NAME }}/go.sum

      - name: Test
        working-directory: ${{ env.EXTENSION_NAME }}
        run: go test -count=1 ./...

      - name: Build binary
        id: build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cd "$EXTENSION_NAME"
          platform="$(go env GOOS)_$(go env GOARCH)"
          asset="$EXTENSION_NAME-$platform"
          go build -trimpath -ldflags="-s -w" -o "../dist/$asset" .
          cd ../dist
          shasum -a 256 "$asset" | awk '{print $1}' > "$asset.sha256"
          echo "platform=$platform" >> "$GITHUB_OUTPUT"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXTENSION_NAME }}-${{ steps.build.outputs.platform }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release manifest
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p upload
          find dist -maxdepth 3 -type f -print -exec cp {} upload/ \;

      - name: Author cannon-extension.json
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const extensionName = process.env.EXTENSION_NAME;
          const version = process.env.VERSION;
          const repo = process.env.GITHUB_REPOSITORY;
          const uploadDir = 'upload';
          const assets = {};

          for (const file of fs.readdirSync(uploadDir).sort()) {
            if (file.endsWith('.sha256')) continue;
            if (!file.startsWith(`${extensionName}-`)) continue;
            const platform = file.slice(extensionName.length + 1);
            const shaPath = path.join(uploadDir, `${file}.sha256`);
            const sha256 = fs.existsSync(shaPath) ? fs.readFileSync(shaPath, 'utf8').trim() : '';
            assets[platform] = {
              url: `https://github.com/${repo}/releases/download/${version}/${file}`,
              sha256
            };
          }

          const manifest = {
            name: extensionName,
            version,
            assets
          };
          fs.writeFileSync(path.join(uploadDir, 'cannon-extension.json'), `${JSON.stringify(manifest, null, 2)}\n`);
          NODE
          cat upload/cannon-extension.json

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: upload/*
